    <!-- ═══════════════════════════════════════════════════════════════
         ANTI-FLICKER: Apply saved theme before any CSS loads
    ═══════════════════════════════════════════════════════════════ -->
    <script>
      let t = localStorage.getItem('selectedTheme') || 'auto';
      if (t === 'auto') {
        const hour = new Date().getHours();
        if (hour >= 6 && hour < 12) t = "light";
        else if (hour >= 12 && hour < 16) t = "ocean";
        else if (hour >= 16 && hour < 19) t = "sunset";
        else t = "midnight";
      }
      document.documentElement.setAttribute('data-theme', t);
    </script>
